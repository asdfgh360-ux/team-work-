<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>团队分工 - 课堂抽签系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 自定义动画 */
    @keyframes bounce-custom {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.05);
      }
    }

    .animate-bounce {
      animation: bounce-custom 0.15s ease-in-out infinite;
    }

    /* 按钮点击效果 */
    button:active {
      transform: scale(0.95);
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // 团队分工抽签系统

    // 根据人数返回角色配置
    function getRoleConfig(memberCount) {
      switch (memberCount) {
        case 3:
          return { roles: ['主持人（主）', '主持人（副）', '记录官'], emptySlots: 0 };
        case 4:
          return { roles: ['主持人（主）', '主持人（副）', '计时官', '记录官'], emptySlots: 0 };
        case 5:
          return { roles: ['主持人（主）', '主持人（副）', '计时官', '记录官'], emptySlots: 1 };
        case 6:
          return { roles: ['主持人（主）', '主持人（副）', '计时官', '记录官'], emptySlots: 2 };
        default:
          return { roles: [], emptySlots: 0 };
      }
    }

    // 烟花粒子类
    class FireworkParticle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.alpha = 1;
        this.color = color;
        this.decay = Math.random() * 0.015 + 0.015;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1; // 重力
        this.alpha -= this.decay;
      }

      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // 烟花类
    class Firework {
      constructor(x, y) {
        this.particles = [];
        const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181', '#aa96da', '#fcbad3'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 30; i++) {
          this.particles.push(new FireworkParticle(x, y, color));
        }
      }

      update() {
        this.particles.forEach(p => p.update());
        this.particles = this.particles.filter(p => p.alpha > 0);
      }

      draw(ctx) {
        this.particles.forEach(p => p.draw(ctx));
      }

      isDead() {
        return this.particles.length === 0;
      }
    }

    // 主应用
    function initApp() {
      const app = document.getElementById('app');

      if (!app) {
        console.error('App element not found');
        return;
      }

      let currentStep = 'input';
      let memberCount = 4;
      let currentRoleIndex = 0;
      let remainingRoles = [];
      let assignedRoles = [];
      let isRolling = false;
      let rollInterval = null;
      let fireworks = [];
      let animationFrameId = null;
      let currentDisplayRole = '';

      // 创建主容器
      app.innerHTML = `
        <div class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-800 flex items-center justify-center p-4">
          <div class="w-full max-w-2xl">
            <!-- 输入界面 -->
            <div id="inputScreen" class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl">
              <h1 class="text-4xl md:text-5xl font-bold text-center text-white mb-8 tracking-wide">
                🎯 团队分工
              </h1>
              <div class="text-center mb-8">
                <p class="text-white/80 text-lg mb-6">请选择学生人数</p>
                <div class="flex justify-center gap-3 flex-wrap">
                  <button class="member-btn px-6 py-3 rounded-xl text-xl font-bold transition-all duration-300 bg-white/20 text-white hover:bg-white/30 hover:scale-105" data-count="3">
                    3人
                  </button>
                  <button class="member-btn px-6 py-3 rounded-xl text-xl font-bold transition-all duration-300 bg-gradient-to-r from-yellow-400 to-orange-500 text-white scale-110 shadow-lg" data-count="4">
                    4人
                  </button>
                  <button class="member-btn px-6 py-3 rounded-xl text-xl font-bold transition-all duration-300 bg-white/20 text-white hover:bg-white/30 hover:scale-105" data-count="5">
                    5人
                  </button>
                  <button class="member-btn px-6 py-3 rounded-xl text-xl font-bold transition-all duration-300 bg-white/20 text-white hover:bg-white/30 hover:scale-105" data-count="6">
                    6人
                  </button>
                </div>
              </div>
              <div class="text-center mt-8">
                <button id="startBtn" class="px-12 py-4 bg-gradient-to-r from-green-400 to-emerald-500 text-white text-2xl font-bold rounded-2xl shadow-lg hover:scale-105 transition-all duration-300 hover:shadow-xl">
                  开始抽签 🎲
                </button>
              </div>
            </div>

            <!-- 抽签界面 -->
            <div id="lotteryScreen" class="hidden">
              <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 shadow-2xl">
                <h2 id="lotteryTitle" class="text-3xl font-bold text-center text-white mb-6">
                  团队分工
                </h2>

                <!-- 滚动区域 -->
                <div class="bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl p-1 mb-6">
                  <div class="bg-white/20 backdrop-blur rounded-xl p-8 text-center">
                    <div id="rollingRole" class="text-5xl md:text-6xl font-bold text-white min-h-[80px] flex items-center justify-center">
                      准备开始
                    </div>
                  </div>
                </div>

                <!-- 控制按钮 -->
                <div class="text-center mb-8">
                  <button id="rollBtn" class="px-16 py-5 bg-gradient-to-r from-red-500 to-pink-500 text-white text-3xl font-bold rounded-2xl shadow-lg hover:scale-105 transition-all duration-300 hover:shadow-xl">
                    开始 🎰
                  </button>
                </div>

                <!-- 已分配结果 -->
                <div id="assignedList" class="bg-white/10 rounded-xl p-4 mb-6 min-h-[100px]">
                  <h3 class="text-white/80 text-sm mb-3 text-center">已分配角色</h3>
                  <div id="assignedItems" class="flex flex-wrap gap-2 justify-center"></div>
                </div>

                <!-- 进度显示 -->
                <div class="text-center">
                  <p class="text-white/60 text-sm">
                    剩余 <span id="remainingCount" class="text-yellow-400 font-bold">0</span> 个角色待分配
                  </p>
                </div>
              </div>

              <!-- 重置按钮 -->
              <div class="text-center mt-6">
                <button id="resetBtn" class="px-8 py-3 bg-white/20 text-white/80 rounded-xl hover:bg-white/30 transition-all duration-300">
                  重新开始
                </button>
              </div>
            </div>

            <!-- 烟花画布 -->
            <canvas id="fireworkCanvas" class="fixed inset-0 pointer-events-none z-50"></canvas>
          </div>
        </div>
      `;

      // 获取元素
      const inputScreen = document.getElementById('inputScreen');
      const lotteryScreen = document.getElementById('lotteryScreen');
      const startBtn = document.getElementById('startBtn');
      const rollBtn = document.getElementById('rollBtn');
      const resetBtn = document.getElementById('resetBtn');
      const rollingRole = document.getElementById('rollingRole');
      const assignedItems = document.getElementById('assignedItems');
      const remainingCount = document.getElementById('remainingCount');
      const fireworkCanvas = document.getElementById('fireworkCanvas');
      const ctx = fireworkCanvas.getContext('2d');
      const memberBtns = document.querySelectorAll('.member-btn');

      // 设置画布尺寸
      function resizeCanvas() {
        if (fireworkCanvas && ctx) {
          fireworkCanvas.width = window.innerWidth;
          fireworkCanvas.height = window.innerHeight;
        }
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // 人数选择
      memberBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          memberBtns.forEach(b => {
            b.classList.remove('bg-gradient-to-r', 'from-yellow-400', 'to-orange-500', 'scale-110', 'shadow-lg');
            b.classList.add('bg-white/20', 'text-white');
          });
          btn.classList.remove('bg-white/20', 'text-white');
          btn.classList.add('bg-gradient-to-r', 'from-yellow-400', 'to-orange-500', 'scale-110', 'shadow-lg');
          memberCount = parseInt(btn.getAttribute('data-count') || '4');
        });
      });

      // 开始抽签
      startBtn.addEventListener('click', () => {
        const config = getRoleConfig(memberCount);
        remainingRoles = [...config.roles, ...Array(config.emptySlots).fill('空')];
        // 随机打乱顺序
        remainingRoles = remainingRoles.sort(() => Math.random() - 0.5);
        currentRoleIndex = 0;
        assignedRoles = [];
        currentStep = 'lottery';

        if (inputScreen) inputScreen.classList.add('hidden');
        if (lotteryScreen) lotteryScreen.classList.remove('hidden');

        updateLotteryUI();
      });

      // 滚动/停止
      rollBtn.addEventListener('click', () => {
        if (!isRolling) {
          // 开始滚动
          isRolling = true;
          rollBtn.textContent = '喊停! 🛑';
          rollBtn.classList.remove('from-red-500', 'to-pink-500');
          rollBtn.classList.add('from-green-500', 'to-emerald-500');

          rollInterval = window.setInterval(() => {
            const randomIndex = Math.floor(Math.random() * remainingRoles.length);
            currentDisplayRole = remainingRoles[randomIndex];
            if (rollingRole) {
              rollingRole.textContent = currentDisplayRole;
              // 添加抖动效果
              rollingRole.classList.add('animate-bounce');
            }
          }, 80);
        } else {
          // 停止滚动
          isRolling = false;
          if (rollInterval) {
            clearInterval(rollInterval);
            rollInterval = null;
          }

          rollBtn.textContent = '开始 🎰';
          rollBtn.classList.remove('from-green-500', 'to-emerald-500');
          rollBtn.classList.add('from-red-500', 'to-pink-500');

          if (rollingRole) {
            rollingRole.classList.remove('animate-bounce');
          }

          // 随机选择一个角色
          const randomIndex = Math.floor(Math.random() * remainingRoles.length);
          const selectedRole = remainingRoles[randomIndex];
          remainingRoles.splice(randomIndex, 1);

          if (rollingRole) {
            rollingRole.textContent = selectedRole;
          }

          assignedRoles.push({ role: selectedRole, order: currentRoleIndex + 1 });
          currentRoleIndex++;

          // 如果是"空"，放烟花
          if (selectedRole === '空') {
            launchFireworks();
          }

          updateLotteryUI();

          // 检查是否结束
          if (remainingRoles.length === 0) {
            setTimeout(() => {
              showFinalResult();
            }, 1500);
          }
        }
      });

      // 重置
      resetBtn.addEventListener('click', () => {
        currentStep = 'input';
        if (lotteryScreen) lotteryScreen.classList.add('hidden');
        if (inputScreen) inputScreen.classList.remove('hidden');
        if (fireworks.length > 0) {
          fireworks = [];
        }
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      });

      // 更新抽签界面
      function updateLotteryUI() {
        // 检查是否已全部完成
        const isCompleted = remainingRoles.length === 0;

        // 更新标题
        const lotteryTitle = document.getElementById('lotteryTitle');
        if (lotteryTitle) {
          if (isCompleted) {
            lotteryTitle.innerHTML = '<span class="text-green-400">🎉 抽签完毕 🎉</span>';
          } else {
            lotteryTitle.textContent = '团队分工';
          }
        }
        if (remainingCount) {
          remainingCount.textContent = remainingRoles.length.toString();
        }
        if (assignedItems) {
          assignedItems.innerHTML = assignedRoles.map(a => `
            <div class="px-4 py-2 rounded-lg ${a.role === '空' ? 'bg-gradient-to-r from-yellow-400 to-orange-500' : 'bg-gradient-to-r from-blue-500 to-purple-500'} text-white text-sm font-medium shadow-md">
              #${a.order} ${a.role}
            </div>
          `).join('');
        }
      }

      // 发射烟花
      function launchFireworks() {
        if (!fireworkCanvas || !ctx) return;

        // 创建多个烟花
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const x = Math.random() * fireworkCanvas.width;
            const y = Math.random() * fireworkCanvas.height * 0.6;
            fireworks.push(new Firework(x, y));
            // 每次添加烟花后确保动画在运行
            if (!animationFrameId) {
              animateFireworks();
            }
          }, i * 200);
        }
      }

      // 烟花动画循环
      function animateFireworks() {
        if (!ctx || !fireworkCanvas) return;

        ctx.clearRect(0, 0, fireworkCanvas.width, fireworkCanvas.height);

        fireworks.forEach(fw => {
          fw.update();
          fw.draw(ctx);
        });

        fireworks = fireworks.filter(fw => !fw.isDead());

        if (fireworks.length > 0) {
          animationFrameId = requestAnimationFrame(animateFireworks);
        } else {
          animationFrameId = null;
        }
      }

      // 显示最终结果
      function showFinalResult() {
        if (!lotteryScreen) return;

        const resultHTML = `
          <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-40 p-4">
            <div class="bg-gradient-to-br from-purple-600 to-pink-600 rounded-3xl p-8 max-w-lg w-full shadow-2xl">
              <h2 class="text-3xl font-bold text-center text-white mb-6">🎉 抽签完成！</h2>
              <div class="space-y-3 mb-6">
                ${assignedRoles.map(a => `
                  <div class="flex items-center gap-4 bg-white/20 rounded-xl p-4">
                    <span class="text-2xl font-bold text-yellow-400">#${a.order}</span>
                    <span class="text-xl font-semibold text-white flex-1">${a.role}</span>
                    ${a.role === '空' ? '<span class="text-3xl">🎆</span>' : ''}
                  </div>
                `).join('')}
              </div>
              <button id="closeResultBtn" class="w-full py-4 bg-white/20 text-white text-xl font-bold rounded-xl hover:bg-white/30 transition-all duration-300">
                确定
              </button>
            </div>
          </div>
        `;

        const resultDiv = document.createElement('div');
        resultDiv.innerHTML = resultHTML;
        lotteryScreen.appendChild(resultDiv);

        document.getElementById('closeResultBtn').addEventListener('click', () => {
          resultDiv.remove();
        });
      }
    }

    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initApp);
  </script>
</body>
</html>
